# 外参标定配置文件

# 输入数据配置
image_dir: "/root/3dtof_calib/images/"

# 相机内参配置
camera_intrinsics:
  tof1: "/root/3dtof_calib/src/3dtof_calib/config/rgb_tof1_intrinsic.yaml"
  tof2: "/root/3dtof_calib/src/3dtof_calib/config/tof2_intrinsic.yaml" 

# 标定数据列表
# 格式: image: filename, camera: camera_id, pose: [x, y, z, roll, pitch, yaw]
data:
  - image: "tof1.jpg"
    camera: "tof1"
    pose: [500, -225, -25, 90, 0, 90]
  - image: "tof2.jpg"
    camera: "tof2"
    pose: [-700, 225, -25, 90, 0, -90]

# 棋盘格参数
board_parameters:
  cols: 11          # 内角点列数
  rows: 8           # 内角点行数
  square_length: 45 # 格子边长 (mm)

# 输出配置
output_file: "/private/calib_file/"
step: 1 # 处理步长 (针对文件列表的行数)
scale_factor: 2.0 # 图像缩放因子 (用于亚分辨率处理)
